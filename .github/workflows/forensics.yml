name: forensics-deep

# Forense PROFUNDO a nivel mesa, en la NUBE. Separado del poll de 5 min porque es pesado:
# barrido COMPLETO de las ~92.7k mesas (lista cada distrito + trae el detalle de cada acta
# en paralelo, ~25 min) y publica forensics_deep.json a Vercel Blob. Cadencia horaria: la
# distribución de dígitos no cambia minuto a minuto y el barrido completo es caro.
#
# El dispatch manual permite una muestra rápida (target_mesas) en vez del barrido completo.

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      target_mesas:
        description: "Mesas objetivo (vacío o 'full' = barrido completo ~92.7k)"
        default: "full"

concurrency:
  group: forensics-deep
  cancel-in-progress: false

jobs:
  deep:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Instalar dependencias
        run: pip install -r engine/requirements.txt
      - name: Barrido forense de mesa y publicar a Blob
        working-directory: engine
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ONPE_PROXY: ${{ secrets.ONPE_PROXY }}
        # Cron → barrido completo; dispatch puede pasar un número para muestra rápida.
        # Concurrencia moderada (16) para no gatillar el rate-limit de ONPE en el barrido largo.
        run: python -u -m gotham.deep_forensics "${{ github.event.inputs.target_mesas || 'full' }}" 10 || true
